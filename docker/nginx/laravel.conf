# HTTP: serves the ACME (Let's Encrypt) challenge and redirects everything to HTTPS.
server {
    listen 80;
    server_name orcei.app.br;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: serves the application.
#
# NOTE: this block requires the certificate to already exist, otherwise nginx
# fails to start. On a brand-new environment, comment it out, issue the first
# certificate, then re-enable it:
#   1. docker compose up -d
#   2. docker compose run --rm --entrypoint certbot certbot certonly --webroot \
#        -w /var/www/certbot -d orcei.app.br --email lepinholima@gmail.com \
#        --agree-tos --no-eff-email
#   3. docker compose exec nginx nginx -s reload
server {
    listen 443 ssl;
    server_name orcei.app.br;
    index index.php;
    root /var/www/public;

    ssl_certificate     /etc/letsencrypt/live/orcei.app.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orcei.app.br/privkey.pem;

    client_max_body_size 51g;
    client_body_buffer_size 512k;
    client_body_in_file_only clean;

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTPS on;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
        gzip_static on;
    }

    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}
