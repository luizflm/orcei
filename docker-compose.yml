services:
  app:
    build:
        context: .
        dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /var/www/
    volumes:
        - ./:/var/www
    depends_on:
        - db
        - redis
    networks:
        - laravel

  supervisor:
    build:
        context: .
        dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /var/www/
    user: root
    command: /usr/bin/supervisord -n -c /etc/supervisor/conf.d/supervisord.conf
    volumes:
        - ./:/var/www
    depends_on:
        - db
        - redis
    networks:
        - laravel

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
        - "80:80"
        - "443:443"
    volumes:
        - ./:/var/www
        - ${NGINX_CONF_FILE:-./docker/nginx/local.conf}:/etc/nginx/conf.d/default.conf
        - ./.docker/certbot/conf:/etc/letsencrypt
        - ./.docker/certbot/www:/var/www/certbot
    # Reload every 6h so renewed certificates are picked up without a manual restart.
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"
    networks:
        - laravel

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
        - ./.docker/certbot/conf:/etc/letsencrypt
        - ./.docker/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./.docker/db:/var/lib/postgresql/data
    networks:
      - laravel

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - ./.docker/redis:/data
    networks:
      - laravel

networks:
  laravel:
    driver: bridge